<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dr. Aparna — Radiology">
  <defs>
    <linearGradient id="dabg" x1="32" y1="20" x2="228" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DDD6FE"/>
      <stop offset="0.42" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="damark" x1="128" y1="72" x2="128" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="daglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5B21B6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="14" y="14" width="228" height="228" rx="54" fill="url(#dabg)"/>
  <rect x="22" y="22" width="212" height="212" rx="46" stroke="#F5F3FF" stroke-opacity="0.4" stroke-width="3"/>

  <!-- CT slice rings -->
  <g stroke="#FFFFFF" fill="none" opacity="0.85">
    <circle cx="182" cy="86" r="30" stroke-opacity="0.22" stroke-width="3"/>
    <circle cx="182" cy="86" r="20" stroke-opacity="0.38" stroke-width="2.5"/>
    <circle cx="182" cy="86" r="10" stroke-opacity="0.55" stroke-width="2"/>
    <line x1="182" y1="56" x2="182" y2="116" stroke-opacity="0.18" stroke-width="2"/>
    <line x1="152" y1="86" x2="212" y2="86" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <!-- Ultrasound arcs -->
  <g stroke="#FFFFFF" stroke-linecap="round" fill="none">
    <path d="M76 170 A48 48 0 0 1 76 122" stroke-width="5" stroke-opacity="0.55"/>
    <path d="M66 170 A60 60 0 0 1 66 112" stroke-width="4" stroke-opacity="0.38"/>
    <path d="M56 170 A72 72 0 0 1 56 102" stroke-width="3.5" stroke-opacity="0.24"/>
    <circle cx="76" cy="170" r="5" fill="#FFFFFF" fill-opacity="0.9" stroke="none"/>
  </g>

  <!-- Monogram A (Dr. Aparna) -->
  <g filter="url(#daglow)">
    <path
      fill="url(#damark)"
      d="M128 74 L172 186 H154 L142 150 H114 L102 186 H84 L128 74 Z M118 132 H138 L128 108 Z"
    />
  </g>

  <!-- Diagnostic pulse line -->
  <path
    d="M86 206 H106 L118 192 L128 210 L140 196 L152 206 H170"
    stroke="#F5F3FF"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.92"
  />
</svg>
